name: Release (multi-OS + GUI + deb/rpm, draft)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "手动触发时可指定版本号（例如 v1.2.3）"
        required: false
        default: "v0.0.0-dev"

permissions:
  contents: write

jobs:
  # 1. 编译并发布 CLI 程序 (GoReleaser)
  goreleaser-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - name: Run GoReleaser (release)
        uses: goreleaser/goreleaser-action@v7
        with:
          version: ~> v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. 编译 GUI 程序 (Windows x86_64 & arm64)
  build-gui-windows:
    needs: goreleaser-cli
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Determine Version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "APP_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "APP_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Build Windows amd64
        run: wails build -platform windows/amd64 -ldflags "-X main.Version=${{ env.APP_VERSION }}"

      - name: Rename Output (amd64)
        run: mv build/bin/driftsync.exe build/bin/driftsync_gui_windows_amd64.exe

      - name: Build Windows arm64
        run: wails build -platform windows/arm64 -ldflags "-X main.Version=${{ env.APP_VERSION }}"

      - name: Rename Output (arm64)
        run: mv build/bin/driftsync.exe build/bin/driftsync_gui_windows_arm64.exe

      - name: Upload GUI Release Assets
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/bin/driftsync_gui_windows_amd64.exe
            build/bin/driftsync_gui_windows_arm64.exe

  # 3. 编译 GUI 程序 (Linux amd64)
  build-gui-linux:
    needs: goreleaser-cli
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies (Linux)
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Determine Version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "APP_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "APP_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Build Linux amd64
        run: wails build -platform linux/amd64 -tags webkit2_41 -ldflags "-X main.Version=${{ env.APP_VERSION }}"

      - name: Package Linux Binary (tar.gz)
        run: |
          cd build/bin
          tar -czvf driftsync_gui_linux_amd64.tar.gz driftsync

      - name: Upload tar.gz to Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/bin/driftsync_gui_linux_amd64.tar.gz

      - name: Upload packaging bundle (for package-gui-linux job)
        uses: actions/upload-artifact@v7
        with:
          name: gui-linux-bundle
          path: build/bin/driftsync
          retention-days: 1

  # 4. 打包 GUI 程序为 .deb/.rpm (Linux)
  package-gui-linux:
    needs: build-gui-linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - name: Download packaging bundle
        uses: actions/download-artifact@v8
        with:
          name: gui-linux-bundle
          path: build/bin

      - name: Determine Version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "APP_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "APP_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Package as .deb, .rpm and Arch Linux package
        env:
          NFPM_VERSION: ${{ env.APP_VERSION }}
        run: |
          # Strip leading 'v' — RPM version field must not start with 'v'
          export NFPM_VERSION="${NFPM_VERSION#v}"
          chmod +x build/bin/driftsync
          nfpm package --config build/linux/nfpm.yaml --packager deb --target .
          nfpm package --config build/linux/nfpm.yaml --packager rpm --target .
          nfpm package --config build/linux/nfpm.yaml --packager archlinux --target .

      - name: Upload Linux packages to Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ./*.deb
            ./*.rpm
            ./*.pkg.tar.zst

  # 5. 编译 GUI 程序 (macOS amd64 & arm64)
  build-gui-macos:
    needs: goreleaser-cli
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Determine Version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "APP_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "APP_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Build macOS amd64
        run: wails build -platform darwin/amd64 -ldflags "-X main.Version=${{ env.APP_VERSION }}"

      - name: Package macOS amd64
        run: |
          cd build/bin
          zip -r driftsync_gui_macos_amd64.app.zip driftsync.app
          rm -rf driftsync.app

      - name: Build macOS arm64
        run: wails build -platform darwin/arm64 -ldflags "-X main.Version=${{ env.APP_VERSION }}"

      - name: Package macOS arm64
        run: |
          cd build/bin
          zip -r driftsync_gui_macos_arm64.app.zip driftsync.app

      - name: Upload GUI Release Assets
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/bin/driftsync_gui_macos_amd64.app.zip
            build/bin/driftsync_gui_macos_arm64.app.zip
