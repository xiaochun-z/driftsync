name: Release (multi-OS + GUI + deb/rpm, draft)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "手动触发时可指定版本号（例如 v1.2.3）"
        required: false
        default: "v0.0.0-dev"

permissions:
  contents: write

jobs:
  # 1. 编译并发布 CLI 程序 (GoReleaser)
  goreleaser-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"

      - name: Run GoReleaser (release)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: ~> v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. 编译 GUI 程序 (Windows x86_64 & arm64)
  build-gui-windows:
    needs: goreleaser-cli
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows amd64
        run: wails build -platform windows/amd64

      - name: Rename Output (amd64)
        run: mv build/bin/driftsync.exe build/bin/driftsync-gui-windows-amd64.exe

      - name: Build Windows arm64
        run: wails build -platform windows/arm64

      - name: Rename Output (arm64)
        run: mv build/bin/driftsync.exe build/bin/driftsync-gui-windows-arm64.exe

      - name: Upload GUI Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/bin/driftsync-gui-windows-amd64.exe
            build/bin/driftsync-gui-windows-arm64.exe

  # 3. 编译 GUI 程序 (Linux amd64)
  build-gui-linux:
    needs: goreleaser-cli
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux amd64
        run: wails build -platform linux/amd64 -tags webkit2_41

      - name: Package Linux Binary
        run: |
          cd build/bin
          tar -czvf driftsync-gui-linux-amd64.tar.gz driftsync

      - name: Upload GUI Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/bin/driftsync-gui-linux-amd64.tar.gz
